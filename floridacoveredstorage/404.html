<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Page Not Found | Florida Covered Storage</title>
<link rel="stylesheet" href="/css/divi-style.min.css">
<style>
body{font-family:'Open Sans',sans-serif;background:#fff;margin:0;padding:0}
.notfound-wrap{text-align:center;padding:100px 20px}
.notfound-wrap h1{font-size:4rem;color:#8b20bb;margin:0 0 10px}
.notfound-wrap h2{font-size:1.5rem;color:#2a2a2a;margin:0 0 20px}
.notfound-wrap p{color:#666;margin:0 0 30px}
.notfound-wrap a{display:inline-block;background:#8b20bb;color:#fff;padding:12px 28px;text-decoration:none;border-radius:3px;font-weight:600}
.notfound-wrap a:hover{background:#6a0f96}
</style>
</head>
<body>
<div class="notfound-wrap">
  <h1>404</h1>
  <h2>Page Not Found</h2>
  <p>The page you are looking for does not exist.</p>
  <a href="/">Return to Home</a>
</div>
</body>
</html>
